<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VULT ID - Restablecer Contraseña</title>
    <style>
        :root { --primary: #21436d; --accent: #5bfce9; --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #fff; --text-muted: #8b949e; --error: #f85149; --success: #3fb950; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 1.5rem; color: var(--accent); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
        .card h2 { font-size: 1.25rem; margin-bottom: 8px; text-align: center; }
        .card p { color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; display: none; }
        .msg-error { background: rgba(248, 81, 73, 0.1); border: 1px solid var(--error); color: var(--error); }
        .msg-success { background: rgba(63, 185, 80, 0.1); border: 1px solid var(--success); color: var(--success); }
        .links { text-align: center; margin-top: 16px; font-size: 0.875rem; }
        .links a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><h1>VULT ID</h1></div>
        <div class="card">
            <h2>Restablecer Contraseña</h2>
            <p>Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

            <div class="msg msg-error" id="errorMsg"></div>
            <div class="msg msg-success" id="successMsg"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Enviar Enlace</button>
            </form>

            <div class="links"><a href="/login.html">Volver al inicio de sesión</a></div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');

            btn.disabled = true; btn.textContent = 'Enviando...';
            errorDiv.style.display = 'none'; successDiv.style.display = 'none';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
                const data = await res.json();
                if (data.success) {
                    successDiv.textContent = 'Si el email existe, recibirás un enlace de restablecimiento.';
                    successDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = data.error; errorDiv.style.display = 'block';
                }
            } catch (err) { errorDiv.textContent = 'Error de conexión'; errorDiv.style.display = 'block'; }
            btn.disabled = false; btn.textContent = 'Enviar Enlace';
        });
    </script>
</body>
</html>
