services:
  db:
    image: postgres:16
    container_name: vultid-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vultid}
      POSTGRES_USER: ${POSTGRES_USER:-vultid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vultid_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vultid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vultid-api
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8105
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vultid}:${POSTGRES_PASSWORD:-vultid_secret}@db:5432/${POSTGRES_DB:-vultid}
      - FACEAPI_ORIGIN_ALLOWED=${FACEAPI_ORIGIN_ALLOWED:-*}
      - DEMOGNITION_ENDPOINT=${DEMOGNITION_ENDPOINT:-/login-user-test/}
      - RECOGNITION_ENDPOINT=${RECOGNITION_ENDPOINT:-/recognize/}
      - VERIFICATION_ENDPOINT=${VERIFICATION_ENDPOINT:-/verify-id/}
      - JWT_SECRET=${JWT_SECRET:-vultid-jwt-secret-change-in-production}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-vultid2024}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - WOMPI_APP_ID=${WOMPI_APP_ID}
      - WOMPI_API_SECRET=${WOMPI_API_SECRET}
      - WOMPI_API_URL=${WOMPI_API_URL:-https://api.wompi.sv}
      - WOMPI_AUTH_URL=${WOMPI_AUTH_URL:-https://id.wompi.sv/connect/token}
      - ZOHO_API_KEY=${ZOHO_API_KEY}
      - ZOHO_FROM_EMAIL=${ZOHO_FROM_EMAIL}
      - ZOHO_FROM_NAME=${ZOHO_FROM_NAME:-VULT ID}
    ports:
      - "${API_PORT:-8105}:8105"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/models:/app/models
      - ./server/public:/app/public

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vultid-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
